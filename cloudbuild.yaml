steps:
# Build the docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/optical-genre-468001-v1/portfolio-website/portfolio:latest', '.']

# Push the docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/optical-genre-468001-v1/portfolio-website/portfolio:latest']

# Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'portfolio'
    - '--image=us-central1-docker.pkg.dev/optical-genre-468001-v1/portfolio-website/portfolio:latest'
    - '--region=us-central1'
    - '--port=8080'
    - '--platform=managed'
    - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
